<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IUS Drum Sequencer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#0b0b0b;--bg4:#1c1c1c;
  --border:#222;--border2:#2c2c2c;--border3:#383838;
  --text:#bdbdb5;--text-dim:#424240;--text-mid:#6e6e68;
  --blue:#2a6ef5;--blue2:#1a4ecc;--blue-dim:#0a1e50;--blue-glow:rgba(42,110,245,.3);
  --red:#c02828;--red2:#8a1a1a;--red-glow:rgba(192,40,40,.45);
  --green:#1a9648;--green-glow:rgba(26,150,72,.35);
  --cat-d:#c03838;--cat-b:#3858c0;--cat-s:#38a858;--cat-f:#9838c0;--cat-c:#888050;
  --ctrl-w:204px;
}

html[data-theme="light"]{
  --bg:#f5f5f2;--bg2:#ffffff;--bg3:#ebebe6;--bg4:#deded7;
  --border:#d2d2ca;--border2:#c2c2ba;--border3:#9f9f95;
  --text:#181816;--text-dim:#73736b;--text-mid:#34342f;
  --blue:#1e56d9;--blue2:#123eaa;--blue-dim:#dce7ff;--blue-glow:rgba(30,86,217,.18);
  --red:#b01d1d;--red2:#7d1212;--red-glow:rgba(176,29,29,.18);
  --green:#0f7a39;--green-glow:rgba(15,122,57,.18);
  --cat-d:#b52626;--cat-b:#2953c4;--cat-s:#178446;--cat-f:#8f2db8;--cat-c:#8c7d24;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg3);font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);height:100%;overflow:hidden;}
body{transition:background .15s ease,color .15s ease;}
.app{display:flex;flex-direction:column;height:100vh;}

/* ── TOP BAR ── */
.topbar{
  flex-shrink:0;background:var(--bg3);border-bottom:1px solid var(--border2);
  padding:5px 14px;display:flex;align-items:center;gap:9px;z-index:200;user-select:none;}
.logo-block{display:flex;flex-direction:column;gap:1px;flex-shrink:0;padding-right:2px;}
.logo-img{display:block;height:24px;width:auto;max-width:110px;object-fit:contain;}
html[data-theme="light"] .logo-img{filter:invert(1) brightness(.14);}
.theme-btn{min-width:92px;}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;padding-left:1px;line-height:1.45;}
.vsep{width:1px;height:18px;background:var(--border2);flex-shrink:0;}
.tb-btn{font-family:'Share Tech Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  background:transparent;border:1px solid var(--border2);color:var(--text-mid);
  padding:4px 11px;cursor:pointer;transition:all .1s;flex-shrink:0;}
.tb-btn:hover{border-color:var(--border3);color:var(--text);}
.tb-btn.lib-btn{border-color:var(--blue-dim);color:#4880ff;}
.tb-btn.lib-btn.open{background:rgba(42,110,245,.07);border-color:var(--blue);}
.arm-pill{display:none;align-items:center;gap:7px;
  background:rgba(42,110,245,.1);border:1px solid var(--blue);
  padding:3px 10px;font-size:9px;letter-spacing:.07em;color:#8ab0ff;flex-shrink:0;}
.arm-pill.show{display:flex;}
.arm-pill strong{color:#aac8ff;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.arm-x{cursor:pointer;color:#446;margin-left:2px;font-size:12px;}
.arm-x:hover{color:#88aaff;}
.spacer{flex:1;}
.add-trk{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  background:transparent;border:1px dashed var(--border2);color:var(--text-dim);
  padding:4px 11px;cursor:pointer;transition:all .1s;}
.add-trk:hover{border-color:var(--border3);color:var(--text-mid);}

/* ── BODY ── */
.body-row{display:flex;flex:1;overflow:hidden;}

/* ── LIBRARY SIDEBAR ── */
.lib-side{width:290px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border2);
  display:flex;flex-direction:column;overflow:hidden;transition:width .16s ease;}
.lib-side.closed{width:0;border:none;}
.lib-head{padding:8px 12px 6px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.lib-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-mid);}
.lib-tabs{display:flex;border-bottom:1px solid var(--border2);flex-shrink:0;}
.lib-tab{flex:1;padding:6px 0;text-align:center;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .1s;}
.lib-tab:hover{color:var(--text-mid);}
.lib-tab.active{color:var(--blue);border-bottom-color:var(--blue);}

/* Sounds tab */
.lib-panel{flex:1;overflow-y:auto;display:none;flex-direction:column;}
.lib-panel.active{display:flex;}
.lib-load-bar{padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:6px;align-items:center;}
.load-btn{font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;background:transparent;
  border:1px solid var(--border2);color:var(--text-dim);padding:4px 9px;cursor:pointer;transition:all .1s;white-space:nowrap;}
.load-btn:hover{border-color:var(--border3);color:var(--text-mid);}
.lib-search{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:9.5px;padding:4px 8px;outline:none;}
.lib-search:focus{border-color:var(--blue);}
.lib-search::placeholder{color:var(--text-dim);}
.cat-block{border-bottom:1px solid var(--border);}
.cat-hdr{padding:5px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;transition:background .08s;}
.cat-hdr:hover{background:rgba(255,255,255,.018);}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-dot.d{background:var(--cat-d);} .cat-dot.b{background:var(--cat-b);}
.cat-dot.s{background:var(--cat-s);} .cat-dot.f{background:var(--cat-f);} .cat-dot.c{background:var(--cat-c);}
.cat-lbl{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);flex:1;}
.cat-cnt{font-size:8px;color:var(--text-dim);}
.cat-arrow{font-size:9px;color:var(--text-dim);transition:transform .1s;}
.cat-arrow.open{transform:rotate(90deg);}
.cat-snds{display:none;} .cat-snds.open{display:block;}
.snd-row{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 22px;cursor:pointer;transition:background .07s;}
.snd-row:hover{background:rgba(255,255,255,.025);}
.snd-row.armed{background:rgba(42,110,245,.1);border-left:2px solid var(--blue);padding-left:20px;}
.snd-name{flex:1;font-size:9px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.snd-row.armed .snd-name{color:#8ab0ff;}
.snd-prev{width:18px;height:18px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .08s;flex-shrink:0;}
.snd-row:hover .snd-prev{opacity:1;}
.prev-tri{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid var(--text-mid);}
.snd-row:hover .prev-tri{border-left-color:var(--text);}
.lib-empty{padding:24px 16px;text-align:center;color:var(--text-dim);font-size:9px;line-height:1.8;letter-spacing:.07em;}

/* Map tab */
.map-wrap{min-width:200px;}
.map-head-row{display:flex;border-bottom:2px solid var(--border2);position:sticky;top:0;background:var(--bg2);z-index:10;}
.map-trk-col{width:52px;flex-shrink:0;border-right:1px solid var(--border2);padding:4px 5px;font-size:7.5px;color:var(--text-dim);letter-spacing:.1em;}
.map-slot-cols{display:flex;}
.map-slot-hdr{width:24px;flex-shrink:0;text-align:center;border-right:1px solid var(--border);font-size:7px;color:var(--text-dim);padding:3px 0;}
.map-track-row{display:flex;border-bottom:1px solid var(--border);min-height:28px;}
.map-trk-label{width:52px;flex-shrink:0;border-right:1px solid var(--border2);padding:3px 5px;font-size:7.5px;color:var(--text-mid);display:flex;align-items:center;letter-spacing:.06em;}
.map-slots{display:flex;}
.map-slot{width:24px;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .07s;min-height:28px;}
.map-slot:hover{background:rgba(255,255,255,.03);}
.ms-pip{width:8px;height:8px;border-radius:50%;background:transparent;border:1px solid #282828;transition:all .07s;}
.map-slot.has .ms-pip{border:none;}
.map-legend{padding:8px 10px;display:flex;gap:9px;flex-wrap:wrap;border-top:1px solid var(--border);}
.map-leg-item{display:flex;align-items:center;gap:4px;font-size:7.5px;color:var(--text-dim);}
.map-leg-dot{width:7px;height:7px;border-radius:50%;}
.map-summary{padding:0 10px 12px;}
.map-sum-title{font-size:7.5px;color:var(--text-dim);letter-spacing:.14em;padding:7px 0 4px;text-transform:uppercase;border-top:1px solid var(--border);}
.map-sum-row{display:flex;gap:8px;align-items:center;padding:3px 0;border-bottom:1px solid var(--border);}
.map-sum-addr{font-size:8px;color:var(--text-dim);width:50px;flex-shrink:0;}
.map-sum-name{font-size:8.5px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.map-sum-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.map-empty{font-size:8px;color:var(--text-dim);padding:8px 0;letter-spacing:.07em;}

/* ── MAIN PANEL ── */
.panel-main{flex:1;overflow:auto;}
.panel-inner{min-width:820px;}
.top-zone{position:sticky;top:0;z-index:100;background:var(--bg);}
.seeker-row{display:flex;height:8px;border-bottom:1px solid var(--border);}
.sk-pad{min-width:var(--ctrl-w);max-width:var(--ctrl-w);border-right:1px solid var(--border);background:var(--bg3);}
.sk-track{flex:1;background:var(--blue-dim);position:relative;overflow:hidden;cursor:pointer;}
.sk-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue));width:0%;transition:width .03s linear;}
.sk-head{position:absolute;top:0;width:2px;height:100%;background:var(--text);box-shadow:0 0 6px var(--blue);left:0;transition:left .03s linear;pointer-events:none;}
.colhdr-row{display:flex;border-bottom:2px solid var(--border2);background:var(--bg);}
.colhdr-left{min-width:var(--ctrl-w);max-width:var(--ctrl-w);border-right:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;padding:0 12px;flex-shrink:0;}
.lib-txt{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);}
.col-nums{flex:1;display:grid;grid-template-columns:repeat(31,1fr);}
.col-n{text-align:center;font-size:8px;color:var(--text-dim);border-right:1px solid var(--border);padding:3px 0;display:flex;align-items:center;justify-content:center;}
.col-n:last-child{border-right:none;}
.col-n.bar{border-right:1px solid #1c1c1c;}
.col-n.live{color:var(--blue);}

/* ── TRACK ROW ── */
.t-row{display:flex;border-bottom:1px solid var(--border);min-height:92px;}
.t-row:hover{background:rgba(255,255,255,.005);}
.t-ctrl{min-width:var(--ctrl-w);max-width:var(--ctrl-w);border-right:1px solid var(--border2);background:var(--bg2);flex-shrink:0;display:flex;flex-direction:column;padding:7px 9px;gap:2px;}
.t-id-row{display:flex;align-items:center;justify-content:space-between;}
.t-id{font-size:8px;color:var(--text-dim);letter-spacing:.14em;}
.t-del{font-size:10px;color:var(--text-dim);cursor:pointer;padding:0 3px;transition:color .1s;}
.t-del:hover{color:#884040;}
.t-bpm-row{display:flex;align-items:center;gap:5px;margin-top:2px;}
.t-bpm-lbl{font-size:8px;color:var(--text-dim);letter-spacing:.1em;width:26px;}
.t-bpm{width:44px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;text-align:center;padding:2px 3px;outline:none;}
.t-bpm:focus{border-color:var(--blue);}
.t-bpm-unit{font-size:7.5px;color:var(--text-dim);letter-spacing:.06em;}
.t-status{font-size:7.5px;color:var(--text-dim);min-height:10px;letter-spacing:.06em;margin-top:2px;}
.t-status.rec{color:var(--red);animation:blink .7s steps(1) infinite;}
.t-status.playing{color:var(--green);}
@keyframes blink{50%{opacity:0;}}
.t-btns{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.ctrl-lbl{font-size:7.5px;color:var(--text-dim);letter-spacing:.06em;}
.btn-rec{width:14px;height:14px;border-radius:50%;background:#180808;border:1.5px solid #2a1010;cursor:pointer;flex-shrink:0;transition:all .1s;}
.btn-rec:hover{border-color:var(--red);}
.btn-rec.on{border-color:var(--red);background:var(--red);box-shadow:0 0 7px var(--red-glow);animation:blink .7s steps(1) infinite;}
.btn-ps{font-size:8px;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:1px solid var(--border2);color:var(--text-dim);padding:3px 7px;cursor:pointer;transition:all .1s;flex-shrink:0;}
.btn-ps:hover{border-color:var(--green);color:var(--green);}
.btn-ps.playing{border-color:var(--red);color:#e06060;}
.btn-loop{width:12px;height:12px;background:#080e18;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);cursor:pointer;flex-shrink:0;transition:all .1s;}
.btn-loop:hover{background:#183060;}
.btn-loop.on{background:var(--blue);filter:drop-shadow(0 0 3px var(--blue-glow));}
.t-upload-row{display:flex;align-items:center;gap:6px;margin-top:3px;}
.t-up-lbl{font-size:8px;color:var(--text-dim);text-decoration:underline;text-underline-offset:2px;cursor:pointer;transition:color .1s;letter-spacing:.05em;}
.t-up-lbl:hover{color:var(--text-mid);}

/* ── LANE ── */
.t-lane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.redline{height:3px;position:relative;background:#140606;flex-shrink:0;overflow:hidden;}
.rl-fill{position:absolute;top:0;left:0;height:100%;background:var(--red);width:0%;transition:width .03s linear;box-shadow:3px 0 10px var(--red-glow);}
.rl-head{position:absolute;top:-1px;width:2px;height:5px;background:#ff8080;left:0;box-shadow:0 0 6px #ff4040;transition:left .03s linear;}
.redline.dim .rl-fill{background:#1c0808;box-shadow:none;}
.redline.dim .rl-head{opacity:0;}
.slot-grid{flex:1;display:grid;grid-template-columns:repeat(31,1fr);align-items:center;}
.slot{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;
  border-right:1px solid var(--border);cursor:pointer;transition:background .06s;gap:2px;padding:4px 1px;}
.slot:last-child{border-right:none;}
.slot:nth-child(4n+1){background:rgba(255,255,255,.004);}
.slot:nth-child(8n+1){border-left:1px solid #1c1c1c;}
.slot.live{background:rgba(42,110,245,.06);}
.slot.can-assign:hover{background:rgba(42,110,245,.12);}
.slot.can-assign:hover .dot{border-color:var(--blue) !important;}
.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid #282828;background:var(--bg);transition:all .07s;pointer-events:none;flex-shrink:0;}
.slot:hover .dot{border-color:#383838;}
.dot.on{background:#b0b0a8;border-color:#888884;box-shadow:0 0 2px rgba(180,180,170,.3);}
.dot.d{background:var(--cat-d);border-color:#e05050;box-shadow:0 0 5px rgba(192,56,56,.5);}
.dot.b{background:var(--cat-b);border-color:#6080e0;box-shadow:0 0 5px rgba(56,88,192,.5);}
.dot.s{background:var(--cat-s);border-color:#50c070;box-shadow:0 0 5px rgba(56,168,88,.5);}
.dot.f{background:var(--cat-f);border-color:#c060e0;box-shadow:0 0 5px rgba(152,56,192,.5);}
.dot.c{background:var(--cat-c);border-color:#aaaa60;box-shadow:0 0 5px rgba(136,128,80,.5);}
.dot.fire{background:#fff !important;border-color:#fff !important;box-shadow:0 0 14px #fff,0 0 28px rgba(255,255,255,.6) !important;}
.slot-lbl{font-size:5.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100% - 2px);text-align:center;pointer-events:none;line-height:1;}

/* ── TOOLTIP ── */
.tip{position:fixed;z-index:9999;background:#1c1c1c;border:1px solid #333;padding:5px 10px;font-size:9px;color:var(--text);letter-spacing:.06em;pointer-events:none;display:none;white-space:nowrap;box-shadow:2px 2px 8px #000;}

/* ── CONTEXT MENU ── */
.ctx{position:fixed;z-index:9999;background:var(--bg2);border:1px solid var(--border3);display:none;min-width:170px;box-shadow:3px 3px 12px rgba(0,0,0,.35);}
.ctx-item{padding:7px 14px;font-size:9px;letter-spacing:.08em;color:var(--text-mid);cursor:pointer;transition:all .07s;}
.ctx-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
.ctx-item.danger:hover{color:#e06060;}
.ctx-sep{height:1px;background:var(--border2);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:#252525;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:#333;}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="logo-block">
    <img class="logo-img" src="assets/images/logo_official.png" alt="IUS official logo">
    <div class="logo-sub">IUS Drum Sequencer<br>Official Prototype Preview</div>
  </div>
  <div class="vsep"></div>
  <button class="tb-btn lib-btn" id="lib-btn" onclick="toggleLib()">☰ LIBRARY</button>
  <button class="tb-btn theme-btn" id="theme-btn" onclick="toggleTheme()" aria-pressed="false" title="Toggle dark and light contrast themes">◐ THEME</button>
  <div class="arm-pill" id="arm-pill">
    ASSIGN: <strong id="arm-name"></strong>
    <span class="arm-x" onclick="clearArm()">✕</span>
  </div>
  <div class="spacer"></div>
  <button class="add-trk" onclick="addTrack()">+ ADD TRACK</button>
</div>

<div class="body-row">

  <!-- LIBRARY -->
  <div class="lib-side closed" id="lib-side">
    <div class="lib-head"><div class="lib-title">Sound Library</div></div>
    <div class="lib-tabs">
      <div class="lib-tab active" id="tab-s" onclick="switchTab('s')">SOUNDS</div>
      <div class="lib-tab" id="tab-m" onclick="switchTab('m')">ASSIGNMENT MAP</div>
    </div>

    <!-- SOUNDS PANEL -->
    <div class="lib-panel active" id="pnl-s">
      <div class="lib-load-bar">
        <label class="load-btn">+ Load Files
          <input type="file" id="lib-fin" multiple accept="audio/*" style="display:none" onchange="loadFiles(this)">
        </label>
        <input class="lib-search" id="lib-q" placeholder="search sounds…" oninput="renderSounds(this.value)">
      </div>
      <div id="snd-list">
        <div class="lib-empty">
          Load .wav / .mp3 / .ogg files.<br><br>
          <span style="color:#2a2a28">Click sound → ARM it<br>then click any slot to assign.</span>
        </div>
      </div>
    </div>

    <!-- MAP PANEL -->
    <div class="lib-panel" id="pnl-m">
      <div id="map-content"></div>
    </div>
  </div>

  <!-- PANEL -->
  <div class="panel-main">
  <div class="panel-inner">
    <div class="top-zone">
      <div class="seeker-row">
        <div class="sk-pad"></div>
        <div class="sk-track" id="sk-track" onclick="seekClick(event)">
          <div class="sk-fill" id="sk-fill"></div>
          <div class="sk-head" id="sk-head"></div>
        </div>
      </div>
      <div class="colhdr-row">
        <div class="colhdr-left"><span class="lib-txt">library</span></div>
        <div class="col-nums" id="col-nums"></div>
      </div>
    </div>
    <div id="tracks"></div>
  </div>
  </div>

</div>
</div>

<div class="tip" id="tip"></div>
<div class="ctx" id="ctx">
  <div class="ctx-item" id="cx-prev">▶  Preview sound</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="cx-asgn">Assign armed sound here</div>
  <div class="ctx-item danger" id="cx-clr">Clear this slot</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="cx-clrall">Clear all slots on this track</div>
</div>

<script>
'use strict';
const STEPS=31;
let tracks=[],sounds=[],nextTid=0,nextSid=0;
let armedSnd=null,audioCtx=null,ctxTgt=null;
const catOpen={d:true,b:true,s:true,f:true,c:true};
const catName={d:'Drums',b:'Bass',s:'Synth',f:'FX',c:'Custom'};

/* ══ INIT ══ */
function init(){
  buildColNums();
  addTrack(90);
  addTrack(50);
  document.addEventListener('click',hideCtx);
  applySavedTheme();
  document.addEventListener('keydown',onKey);
}

/* ══ COLUMN NUMBERS ══ */
function buildColNums(){
  const el=document.getElementById('col-nums');
  for(let i=1;i<=STEPS;i++){
    const d=document.createElement('div');
    d.className='col-n'+(i%4===1?' bar':'');
    d.id='cn-'+i; d.textContent=String(i).padStart(2,'0');
    el.appendChild(d);
  }
}

/* ══ TRACK MANAGEMENT ══ */
function addTrack(bpmVal){
  const tid=++nextTid;
  const t={id:tid,bpm:bpmVal||90,
    slots:new Array(STEPS).fill(false),
    assigns:new Array(STEPS).fill(null),
    looping:true,playing:false,step:-1,timer:null,
    isRec:false,mr:null,chunks:[],defBuf:null,gain:null};
  tracks.push(t);
  renderTrack(t);
  refreshMap();
}

function removeTrack(tid){
  const t=tracks.find(t=>t.id===tid);
  if(t){clearTimeout(t.timer);}
  tracks=tracks.filter(t=>t.id!==tid);
  document.getElementById('tr-'+tid)?.remove();
  refreshMap();
}

function renderTrack(t){
  const wrap=document.getElementById('tracks');
  const row=document.createElement('div');
  row.className='t-row'; row.id='tr-'+t.id;

  // LEFT CTRL
  const ctrl=document.createElement('div');
  ctrl.className='t-ctrl';
  ctrl.innerHTML=`
    <div class="t-id-row">
      <span class="t-id">TRACK ${String(t.id).padStart(2,'0')}</span>
      <span class="t-del">✕</span>
    </div>
    <div class="t-bpm-row">
      <span class="t-bpm-lbl">BPM</span>
      <input class="t-bpm" id="bpm-${t.id}" type="number" value="${t.bpm}" min="20" max="300">
      <span class="t-bpm-unit">bpm</span>
    </div>
    <div class="t-status" id="st-${t.id}">STOPPED</div>
    <div class="t-btns">
      <div class="btn-rec" id="rec-${t.id}"></div><span class="ctrl-lbl">REC</span>
      <button class="btn-ps" id="ps-${t.id}">▶ PLAY</button>
      <div class="btn-loop on" id="lp-${t.id}"></div><span class="ctrl-lbl">LOOP</span>
    </div>
    <div class="t-upload-row">
      <label class="t-up-lbl">upload default audio
        <input type="file" accept="audio/*" style="display:none" id="up-${t.id}">
      </label>
    </div>`;
  row.appendChild(ctrl);

  // LANE
  const lane=document.createElement('div');
  lane.className='t-lane';
  lane.innerHTML=`
    <div class="redline dim" id="rl-${t.id}">
      <div class="rl-fill" id="rlf-${t.id}"></div>
      <div class="rl-head" id="rlh-${t.id}"></div>
    </div>
    <div class="slot-grid" id="sg-${t.id}"></div>`;
  row.appendChild(lane);
  wrap.appendChild(row);

  // Build 31 slots
  const grid=document.getElementById('sg-'+t.id);
  for(let i=0;i<STEPS;i++){
    const sl=document.createElement('div');
    sl.className='slot'; sl.id=`sl-${t.id}-${i}`;
    sl.innerHTML=`<div class="dot" id="dt-${t.id}-${i}"></div><div class="slot-lbl" id="lb-${t.id}-${i}"></div>`;
    sl.addEventListener('click',()=>slotClick(t.id,i));
    sl.addEventListener('contextmenu',e=>slotCtx(e,t.id,i));
    sl.addEventListener('mouseenter',e=>slotHover(e,t.id,i));
    sl.addEventListener('mouseleave',hideTip);
    grid.appendChild(sl);
  }

  // Wire events
  ctrl.querySelector('.t-del').addEventListener('click',()=>removeTrack(t.id));
  ctrl.querySelector('#bpm-'+t.id).addEventListener('input',e=>{const v=parseInt(e.target.value);if(v>=20&&v<=300)t.bpm=v;});
  const recBtn=ctrl.querySelector('#rec-'+t.id);
  recBtn.addEventListener('mousedown',()=>startRec(t.id));
  recBtn.addEventListener('mouseup',()=>stopRec(t.id));
  recBtn.addEventListener('mouseleave',()=>{const tk=tracks.find(t=>t.id===tid_from_rec(recBtn));if(tk&&tk.isRec)stopRec(tk.id);});
  ctrl.querySelector('#ps-'+t.id).addEventListener('click',()=>togglePlay(t.id));
  ctrl.querySelector('#lp-'+t.id).addEventListener('click',()=>toggleLoop(t.id));
  ctrl.querySelector('#up-'+t.id).addEventListener('change',e=>handleUpload(e,t.id));

  function tid_from_rec(el){return t.id;}
}

/* ══ SLOT CLICK ══ */
function slotClick(tid,idx){
  const t=tracks.find(t=>t.id===tid); if(!t) return;
  if(armedSnd){
    t.assigns[idx]=armedSnd.id;
    t.slots[idx]=true;
  } else {
    t.slots[idx]=!t.slots[idx];
    if(!t.slots[idx]) t.assigns[idx]=null;
  }
  updateDot(tid,idx);
  refreshMap();
}

function updateDot(tid,idx){
  const t=tracks.find(t=>t.id===tid);
  const dot=document.getElementById('dt-'+tid+'-'+idx);
  const lbl=document.getElementById('lb-'+tid+'-'+idx);
  if(!t||!dot) return;
  if(!t.slots[idx]){dot.className='dot';lbl.textContent='';return;}
  const sid=t.assigns[idx];
  const snd=sid!=null?sounds.find(s=>s.id===sid):null;
  if(snd){
    dot.className='dot '+snd.cat;
    lbl.textContent=snd.name.replace(/\.[^.]+$/,'').substring(0,5);
  } else {
    dot.className='dot on'; lbl.textContent='';
  }
}

function refreshAllDots(tid){for(let i=0;i<STEPS;i++) updateDot(tid,i);}

/* ══ PER-TRACK SEQUENCER ══ */
function togglePlay(tid){
  const t=tracks.find(t=>t.id===tid); if(!t) return;
  t.playing?stopTrack(tid):startTrack(tid);
}

function startTrack(tid){
  const t=tracks.find(t=>t.id===tid); if(!t) return;
  getCtx(); if(t.step<0) t.step=0;
  t.playing=true;
  setStatus(tid,'playing');
  document.getElementById('ps-'+tid).textContent='■ STOP';
  document.getElementById('ps-'+tid).classList.add('playing');
  document.getElementById('rl-'+tid)?.classList.remove('dim');
  sched(t);
}

function stopTrack(tid){
  const t=tracks.find(t=>t.id===tid); if(!t) return;
  t.playing=false; t.step=-1; clearTimeout(t.timer);
  setStatus(tid,'stopped');
  document.getElementById('ps-'+tid).textContent='▶ PLAY';
  document.getElementById('ps-'+tid).classList.remove('playing');
  document.getElementById('rl-'+tid)?.classList.add('dim');
  setRL(tid,0); clearTrackHL(tid); refreshTransportUI();
}

function sched(t){
  if(!t.playing) return;
  tick(t);
  if(!t.looping && t.step>=STEPS-1){
    stopTrack(t.id);
    return;
  }
  t.step=(t.step+1)%STEPS;
  t.timer=setTimeout(()=>sched(t),60000/t.bpm);
}

let lastSeekFrac=0;
function tick(t){
  const s=t.step, frac=s/(STEPS-1);
  setRL(t.id,frac);
  setSeekerFrac(frac); hlCol(s);
  const prev=(s-1+STEPS)%STEPS;
  document.getElementById('sl-'+t.id+'-'+prev)?.classList.remove('live');
  document.getElementById('sl-'+t.id+'-'+s)?.classList.add('live');
  if(t.slots[s]){
    flashDot(t.id,s);
    const sid=t.assigns[s];
    if(sid!=null){const snd=sounds.find(x=>x.id===sid);if(snd) playSnd(snd);}
    else if(t.defBuf) playBuf(t);
  }
}

function clearTrackHL(tid){for(let i=0;i<STEPS;i++)document.getElementById('sl-'+tid+'-'+i)?.classList.remove('live');}
function setStatus(tid,state){
  const el=document.getElementById('st-'+tid); if(!el) return;
  el.className='t-status';
  if(state==='playing'){el.textContent='● PLAYING';el.classList.add('playing');}
  else if(state==='rec'){el.textContent='● RECORDING';el.classList.add('rec');}
  else el.textContent='STOPPED';
}

/* ══ VISUAL ══ */
function setSeekerFrac(f){
  const tr=document.getElementById('sk-track'); if(!tr) return;
  const px=f*(tr.offsetWidth-2);
  document.getElementById('sk-head').style.left=px+'px';
  document.getElementById('sk-fill').style.width=(f*100)+'%';
}
function setRL(tid,f){
  const rl=document.getElementById('rl-'+tid); if(!rl) return;
  const px=f*(rl.offsetWidth-2);
  document.getElementById('rlh-'+tid).style.left=px+'px';
  document.getElementById('rlf-'+tid).style.width=(f*100)+'%';
}
let lastHL=-1;
function hlCol(s){
  if(lastHL>=0) document.getElementById('cn-'+(lastHL+1))?.classList.remove('live');
  document.getElementById('cn-'+(s+1))?.classList.add('live');
  lastHL=s;
}
function flashDot(tid,idx){
  const d=document.getElementById('dt-'+tid+'-'+idx); if(!d) return;
  d.classList.add('fire'); setTimeout(()=>d.classList.remove('fire'),90);
}
function seekClick(e){
  const tr=document.getElementById('sk-track');
  const f=Math.max(0,Math.min(1,e.offsetX/tr.offsetWidth));
  const ns=Math.round(f*(STEPS-1));
  tracks.forEach(t=>{t.step=ns;});
  setSeekerFrac(f); hlCol(ns);
}

function refreshTransportUI(){
  const active=tracks.find(t=>t.playing);
  if(active){
    const frac=Math.max(0,active.step)/(STEPS-1);
    setSeekerFrac(frac);
    hlCol(Math.max(0,active.step));
    return;
  }
  setSeekerFrac(0);
  if(lastHL>=0){
    document.getElementById('cn-'+(lastHL+1))?.classList.remove('live');
    lastHL=-1;
  }
}

/* ══ LOOP ══ */
function toggleLoop(tid){
  const t=tracks.find(t=>t.id===tid); if(!t) return;
  t.looping=!t.looping;
  document.getElementById('lp-'+tid)?.classList.toggle('on',t.looping);
}

/* ══ AUDIO ══ */
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playSnd(snd){
  if(!snd?.buffer) return;
  const ac=getCtx();
  const src=ac.createBufferSource();
  src.buffer=snd.buffer; src.connect(ac.destination); src.start();
}
function playBuf(t){
  if(!t.defBuf) return;
  const ac=getCtx();
  if(!t.gain){t.gain=ac.createGain();t.gain.connect(ac.destination);}
  const src=ac.createBufferSource();
  src.buffer=t.defBuf; src.connect(t.gain); src.start();
}

/* ══ UPLOAD DEFAULT TRACK AUDIO ══ */
async function handleUpload(e,tid){
  const file=e.target.files[0]; if(!file) return;
  const t=tracks.find(t=>t.id===tid); if(!t) return;
  try{
    const buf=await getCtx().decodeAudioData(await file.arrayBuffer());
    t.defBuf=buf;
  }catch(err){alert('Cannot decode: '+err.message);}
  e.target.value='';
}

/* ══ MIC RECORD ══ */
async function startRec(tid){
  const t=tracks.find(t=>t.id===tid); if(!t||t.isRec) return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    t.chunks=[];
    const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
    t.mr=new MediaRecorder(stream,{mimeType:mime});
    t.mr.ondataavailable=e=>{if(e.data.size>0)t.chunks.push(e.data);};
    t.mr.onstop=async()=>{
      stream.getTracks().forEach(s=>s.stop());
      try{t.defBuf=await getCtx().decodeAudioData(await new Blob(t.chunks,{type:mime}).arrayBuffer());}catch(e){console.error(e);}
      t.isRec=false;
      document.getElementById('rec-'+tid)?.classList.remove('on');
      setStatus(tid,'stopped');
    };
    t.mr.start(50); t.isRec=true;
    document.getElementById('rec-'+tid)?.classList.add('on');
    setStatus(tid,'rec');
  }catch(e){alert('Mic denied: '+e.message);}
}
function stopRec(tid){
  const t=tracks.find(t=>t.id===tid);
  if(!t||!t.isRec) return;
  if(t.mr?.state!=='inactive') t.mr.stop();
}

/* ══ SOUND LIBRARY ══ */
function guesscat(name){
  const n=name.toLowerCase();
  if(/kick|snare|hat|clap|tom|rim|cow|perc|drum|cym/.test(n)) return 'd';
  if(/bass|sub|808/.test(n)) return 'b';
  if(/synth|saw|square|pad|lead|chord/.test(n)) return 's';
  if(/fx|sweep|noise|zap|rev|whoosh|rise|fall/.test(n)) return 'f';
  return 'c';
}

async function loadFiles(input){
  const ac=getCtx(), files=Array.from(input.files);
  for(const f of files){
    try{
      const buf=await ac.decodeAudioData(await f.arrayBuffer());
      sounds.push({id:++nextSid,name:f.name,cat:guesscat(f.name),buffer:buf});
    }catch(e){console.warn('Skip',f.name);}
  }
  renderSounds(document.getElementById('lib-q').value);
  input.value='';
}

function renderSounds(filter=''){
  const fl=filter.toLowerCase();
  const list=document.getElementById('snd-list');
  list.querySelectorAll('.cat-block').forEach(e=>e.remove());
  ['d','b','s','f','c'].forEach(cat=>{
    const snds=sounds.filter(s=>s.cat===cat&&(!fl||s.name.toLowerCase().includes(fl)));
    if(!snds.length) return;
    const block=document.createElement('div'); block.className='cat-block';
    const op=catOpen[cat];
    block.innerHTML=`
      <div class="cat-hdr" onclick="toggleCat('${cat}')">
        <div class="cat-dot ${cat}"></div>
        <span class="cat-lbl">${catName[cat]}</span>
        <span class="cat-cnt">${snds.length}</span>
        <span class="cat-arrow ${op?'open':''}" id="ca-${cat}">›</span>
      </div>
      <div class="cat-snds ${op?'open':''}" id="cs-${cat}"></div>`;
    list.appendChild(block);
    const cs=block.querySelector('#cs-'+cat);
    snds.forEach(snd=>{
      const row=document.createElement('div');
      row.className='snd-row'+(armedSnd?.id===snd.id?' armed':'');
      row.innerHTML=`<span class="snd-name">${snd.name}</span>
        <div class="snd-prev"><div class="prev-tri"></div></div>`;
      row.addEventListener('click',e=>{
        if(e.target.closest('.snd-prev')) playSnd(snd);
        else armSound(snd);
      });
      cs.appendChild(row);
    });
  });
  if(sounds.length) document.querySelector('.lib-empty')?.remove();
}

function toggleCat(cat){
  catOpen[cat]=!catOpen[cat];
  document.getElementById('ca-'+cat)?.classList.toggle('open',catOpen[cat]);
  document.getElementById('cs-'+cat)?.classList.toggle('open',catOpen[cat]);
}

/* ══ ARM ══ */
function armSound(snd){
  armedSnd=snd;
  document.getElementById('arm-pill').classList.add('show');
  document.getElementById('arm-name').textContent=snd.name;
  document.querySelectorAll('.slot').forEach(s=>s.classList.add('can-assign'));
  renderSounds(document.getElementById('lib-q').value);
}
function clearArm(){
  armedSnd=null;
  document.getElementById('arm-pill').classList.remove('show');
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('can-assign'));
  renderSounds(document.getElementById('lib-q').value);
}

/* ══ ASSIGNMENT MAP ══ */
function switchTab(tab){
  document.getElementById('tab-s').classList.toggle('active',tab==='s');
  document.getElementById('tab-m').classList.toggle('active',tab==='m');
  document.getElementById('pnl-s').classList.toggle('active',tab==='s');
  document.getElementById('pnl-m').classList.toggle('active',tab==='m');
  if(tab==='m') refreshMap();
}

function refreshMap(){
  if(!document.getElementById('pnl-m').classList.contains('active')) return;
  const mc=document.getElementById('map-content'); mc.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='map-wrap';

  // Header
  const hdr=document.createElement('div'); hdr.className='map-head-row';
  hdr.innerHTML='<div class="map-trk-col">TRACK</div>';
  const hdrCols=document.createElement('div'); hdrCols.className='map-slot-cols';
  for(let i=1;i<=STEPS;i++){
    const c=document.createElement('div'); c.className='map-slot-hdr';
    c.textContent=String(i).padStart(2,'0'); hdrCols.appendChild(c);
  }
  hdr.appendChild(hdrCols); wrap.appendChild(hdr);

  // Track rows
  tracks.forEach(t=>{
    const row=document.createElement('div'); row.className='map-track-row';
    const lbl=document.createElement('div'); lbl.className='map-trk-label';
    lbl.textContent='T'+String(t.id).padStart(2,'0'); row.appendChild(lbl);
    const slotsDiv=document.createElement('div'); slotsDiv.className='map-slots';
    for(let i=0;i<STEPS;i++){
      const ms=document.createElement('div');
      const sid=t.assigns[i];
      const snd=sid!=null?sounds.find(s=>s.id===sid):null;
      const active=t.slots[i];
      ms.className='map-slot'+(active?' has':'');
      if(active) ms.title=(snd?`T${t.id} · Slot ${i+1} · ${snd.name}`:`T${t.id} · Slot ${i+1} · (active)`);
      const pip=document.createElement('div'); pip.className='ms-pip';
      if(active&&snd) pip.style.background='var(--cat-'+snd.cat+')';
      else if(active) pip.style.cssText='background:#555;border:none;';
      ms.appendChild(pip);
      ms.addEventListener('click',()=>{t.slots[i]=false;t.assigns[i]=null;updateDot(t.id,i);refreshMap();});
      slotsDiv.appendChild(ms);
    }
    row.appendChild(slotsDiv); wrap.appendChild(row);
  });

  // Legend
  const leg=document.createElement('div'); leg.className='map-legend';
  Object.entries({d:'Drums',b:'Bass',s:'Synth',f:'FX',c:'Custom'}).forEach(([k,v])=>{
    const li=document.createElement('div'); li.className='map-leg-item';
    li.innerHTML=`<div class="map-leg-dot" style="background:var(--cat-${k})"></div>${v}`;
    leg.appendChild(li);
  });
  wrap.appendChild(leg);

  // Summary list
  const sum=document.createElement('div'); sum.className='map-summary';
  const st=document.createElement('div'); st.className='map-sum-title'; st.textContent='Assignment List'; sum.appendChild(st);
  let found=false;
  tracks.forEach(t=>{
    for(let i=0;i<STEPS;i++){
      if(!t.slots[i]) continue; found=true;
      const sid=t.assigns[i];
      const snd=sid!=null?sounds.find(s=>s.id===sid):null;
      const row=document.createElement('div'); row.className='map-sum-row';
      const addr=document.createElement('div'); addr.className='map-sum-addr';
      addr.textContent=`T${String(t.id).padStart(2,'0')} · ${String(i+1).padStart(2,'0')}`;
      row.appendChild(addr);
      if(snd){
        const pip=document.createElement('div'); pip.className='map-sum-pip';
        pip.style.background='var(--cat-'+snd.cat+')'; row.appendChild(pip);
        const nm=document.createElement('div'); nm.className='map-sum-name'; nm.textContent=snd.name; row.appendChild(nm);
      } else {
        const nm=document.createElement('div'); nm.className='map-sum-name';
        nm.style.color='var(--text-dim)'; nm.textContent='(no sound assigned)'; row.appendChild(nm);
      }
      sum.appendChild(row);
    }
  });
  if(!found){const e=document.createElement('div');e.className='map-empty';e.textContent='No slots activated yet.';sum.appendChild(e);}
  wrap.appendChild(sum);
  mc.appendChild(wrap);
}

/* ══ SLOT HOVER TOOLTIP ══ */
function slotHover(e,tid,idx){
  const t=tracks.find(t=>t.id===tid); if(!t) return;
  const snd=t.assigns[idx]!=null?sounds.find(s=>s.id===t.assigns[idx]):null;
  const tip=document.getElementById('tip');
  let msg='';
  if(armedSnd&&!t.slots[idx]) msg=`Assign "${armedSnd.name}" → T${String(tid).padStart(2,'0')} Slot ${String(idx+1).padStart(2,'0')}`;
  else if(armedSnd&&t.slots[idx]) msg=`Replace with "${armedSnd.name}" → T${String(tid).padStart(2,'0')} Slot ${String(idx+1).padStart(2,'0')}`;
  else if(t.slots[idx]) msg=`T${String(tid).padStart(2,'0')} · Slot ${String(idx+1).padStart(2,'0')} · ${snd?snd.name:'(active — no sound)'}`;
  else return;
  tip.textContent=msg;
  tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-6)+'px'; tip.style.display='block';
}
function hideTip(){document.getElementById('tip').style.display='none';}

/* ══ CONTEXT MENU ══ */
function slotCtx(e,tid,idx){
  e.preventDefault(); ctxTgt={tid,idx};
  const t=tracks.find(t=>t.id===tid);
  const sid=t?.assigns[idx]; const snd=sid!=null?sounds.find(s=>s.id===sid):null;
  document.getElementById('cx-prev').style.display=snd?'block':'none';
  document.getElementById('cx-asgn').style.display=armedSnd?'block':'none';
  const m=document.getElementById('ctx');
  m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px'; m.style.display='block';
  document.getElementById('cx-prev').onclick=()=>{if(snd)playSnd(snd);hideCtx();};
  document.getElementById('cx-asgn').onclick=()=>{
    if(armedSnd&&t){t.assigns[idx]=armedSnd.id;t.slots[idx]=true;updateDot(tid,idx);refreshMap();}hideCtx();};
  document.getElementById('cx-clr').onclick=()=>{
    if(t){t.slots[idx]=false;t.assigns[idx]=null;updateDot(tid,idx);refreshMap();}hideCtx();};
  document.getElementById('cx-clrall').onclick=()=>{
    if(t){t.slots.fill(false);t.assigns.fill(null);refreshAllDots(tid);refreshMap();}hideCtx();};
}
function hideCtx(){document.getElementById('ctx').style.display='none';}

/* ══ LIBRARY TOGGLE ══ */
function toggleLib(){
  const side=document.getElementById('lib-side');
  const btn=document.getElementById('lib-btn');
  const closed=side.classList.toggle('closed');
  btn.classList.toggle('open',!closed);
  if(!closed) refreshMap();
}


/* ══ THEME ══ */
function applySavedTheme(){
  const saved=localStorage.getItem('ius-theme')||'dark';
  setTheme(saved);
}
function setTheme(theme){
  const root=document.documentElement;
  const btn=document.getElementById('theme-btn');
  const next=theme==='light'?'light':'dark';
  root.setAttribute('data-theme',next);
  if(btn){
    const isLight=next==='light';
    btn.setAttribute('aria-pressed',String(isLight));
    btn.textContent=isLight?'◑ HIGH CONTRAST':'◐ THEME';
    btn.title=isLight?'Switch to dark theme':'Switch to light high-contrast theme';
  }
}
function toggleTheme(){
  const current=document.documentElement.getAttribute('data-theme')==='light'?'light':'dark';
  const next=current==='light'?'dark':'light';
  setTheme(next);
  localStorage.setItem('ius-theme',next);
}

/* ══ KEYBOARD ══ */
function onKey(e){
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Escape'){
    clearArm();
    tracks.forEach(t=>stopTrack(t.id));
    return;
  }
  if(e.code==='Space'){
    e.preventDefault();
    const hasPlaying=tracks.some(t=>t.playing);
    tracks.forEach(t=>hasPlaying?stopTrack(t.id):startTrack(t.id));
  }
}

init();
</script>
</body>
</html>
