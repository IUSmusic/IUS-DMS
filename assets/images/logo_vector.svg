<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400" style="background:#ffffff;">
  <!-- I — vertical rectangle outline -->
  <rect x="60" y="110" width="26" height="180" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- / — diagonal slash, outlined (double-line effect) -->
  <line x1="228" y1="290" x2="332" y2="110" stroke="#1a1a1a" stroke-width="22" stroke-linecap="square"/>
  <line x1="228" y1="290" x2="332" y2="110" stroke="#ffffff" stroke-width="10" stroke-linecap="square"/>

  <!-- U — open top, rounded bottom -->
  <path d="M420 110 L420 258 Q420 292 456 292 L504 292 Q540 292 540 258 L540 110"
        fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- S — two arcs meeting at midpoint -->
  <path d="M860 160 Q860 110 820 110 L776 110 Q726 110 726 162 Q726 200 776 212 L820 222 Q876 236 876 278 Q876 292 844 292"
        fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M726 246 Q726 292 770 292 L818 292 Q876 292 876 262"
        fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
